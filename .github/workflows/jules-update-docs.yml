name: Jules - Update Docs

on:
  push:
    branches-ignore:
      - 'main'
      - 'jules-docs-dev-*'
      - 'jules-patchnotes-dev-*'

jobs:
  run-jules:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Jules - Generate Prompt
        id: generate-prompt
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%s HEAD)
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          COMMIT_DIFF=$(git diff HEAD~1 HEAD)

          PROMPT="The task is created automatically by the CI/CD pipeline system. You are working in the ASLM project (Advanced System Language Models) — a Windows desktop application built with C# and .NET MAUI. The application is a launcher and manager for AI models and modules. The project contains documentation in the 'Docs/ASLM/' directory based on the Hugo Framework (Lotus Docs theme). Your task is to analyze the changes in the commit '${COMMIT_MESSAGE}' and add or update the project documentation. Only process changes to .cs and .xaml.cs files. For components that have both a .xaml and a .xaml.cs file (e.g. AppShellPage.xaml + AppShellPage.xaml.cs), document them as a single page. In the documentation, fully preserve the source file location structure: for example, 'ASLM/Services/ModuleRunner.cs' maps to 'Docs/ASLM/content/docs/ASLM/ASLM/Services/ModuleRunner.md'; 'ASLM/Pages/AppShellPage.xaml.cs' maps to 'Docs/ASLM/content/docs/ASLM/ASLM/Pages/AppShellPage.md'; 'ASLM/Models/ModuleConfig.cs' maps to 'Docs/ASLM/content/docs/ASLM/ASLM/Models/ModuleConfig.md'. Carefully study the existing documentation structure before writing. Write detailed documentation for each public class and method: purpose, parameters, return values, and brief C# usage examples. Do not change any files outside the 'Docs/' folder. Do not touch files in 'Docs/ASLM/content/docs/PatchNotes/' — patch notes are managed by a separate pipeline. If there are no changes to .cs or .xaml.cs files, make a commit without any file changes. Name the output branch 'jules-docs-dev-BRANCH_NAME' where BRANCH_NAME is a short descriptive name for the changes, always preserving the 'jules-docs-dev-' prefix (example: 'jules-docs-dev-module-runner-update'). If there were no relevant file changes, name the branch 'jules-docs-dev-YYYYMMDDHHmm' where YYYYMMDDHHmm is your current UTC time. Keep in mind that this task was created automatically and may have errors, but follow the instructions as closely as possible. Modified files: '${CHANGED_FILES}'. Commit diff: '${COMMIT_DIFF}'."

          {
            echo 'prompt<<EOF'
            echo "$PROMPT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Jules - Create Session
        id: create-session
        env:
          JULES_PROMPT: ${{ steps.generate-prompt.outputs.prompt }}
        run: |
          JSON_PAYLOAD=$(jq -n \
            --arg prompt "$JULES_PROMPT" \
            --arg source_repo "sources/github/${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg title "CI/CD: Update Docs for commit ${{ github.sha }}" \
            '{
              prompt: $prompt,
              sourceContext: {
                source: $source_repo,
                githubRepoContext: { startingBranch: $branch }
              },
              title: $title,
              automationMode: "AUTO_CREATE_PR"
            }')

          RESPONSE_JSON=$(curl -s -X POST \
            'https://jules.googleapis.com/v1alpha/sessions' \
            -H "Content-Type: application/json" \
            -H 'X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}' \
            -d "$JSON_PAYLOAD")

          SESSION_NAME=$(echo "$RESPONSE_JSON" | jq -r '.name')
          echo "Jules session started: $SESSION_NAME"
          echo "session_name=$SESSION_NAME" >> $GITHUB_OUTPUT
          {
            echo 'api_response<<EOF'
            echo "$RESPONSE_JSON"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Jules - Report Result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SESSION_NAME: ${{ steps.create-session.outputs.session_name }}
          API_RESPONSE: ${{ steps.create-session.outputs.api_response }}
        run: |
          COMMIT_SHA="${{ github.event.after }}"

          if [[ -z "$SESSION_NAME" || "$SESSION_NAME" == "null" ]]; then
            ERROR=$(echo "$API_RESPONSE" | jq -r '.error.message // "Unknown error"')
            COMMENT_BODY="❌ Jules Docs: failed to create session. Error: ${ERROR}"
            gh api --method POST -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/commits/$COMMIT_SHA/comments" \
              -f body="$COMMENT_BODY"
            exit 1
          fi

          SESSION_URL="https://jules.google.com/session/$(basename $SESSION_NAME)"
          COMMENT_BODY="🚀 Jules Docs session started. Jules will update documentation and open a PR into a \`jules-docs-dev-*\` branch. Track progress: ${SESSION_URL}"
          echo "Posting comment: $COMMENT_BODY"
          gh api --method POST -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/commits/$COMMIT_SHA/comments" \
            -f body="$COMMENT_BODY"
