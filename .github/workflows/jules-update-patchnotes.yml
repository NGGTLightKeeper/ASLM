name: Jules - Update Patch Notes

on:
  push:
    branches:
      - 'jules-docs-dev-*'

jobs:
  run-jules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 3

      - name: Jules - Generate Prompt
        id: generate-prompt
        run: |
          JULES_DOCS_COMMIT_MESSAGE=$(git log -1 --pretty=%s HEAD)
          JULES_DOCS_CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          JULES_DOCS_COMMIT_DIFF=$(git diff HEAD~1 HEAD)

          BASE_COMMIT_MESSAGE=$(git log -1 --pretty=%s HEAD~1)
          BASE_CHANGED_FILES=$(git diff --name-only HEAD~2 HEAD~1)
          BASE_COMMIT_DIFF=$(git diff HEAD~2 HEAD~1)

          # Cap oversized inputs so the request stays within Jules API and shell limits.
          JULES_DOCS_CHANGED_FILES=$(printf '%s' "${JULES_DOCS_CHANGED_FILES:0:16384}")
          JULES_DOCS_COMMIT_DIFF=$(printf '%s' "${JULES_DOCS_COMMIT_DIFF:0:524288}" | iconv -f UTF-8 -t UTF-8 -c)
          BASE_CHANGED_FILES=$(printf '%s' "${BASE_CHANGED_FILES:0:16384}")
          BASE_COMMIT_DIFF=$(printf '%s' "${BASE_COMMIT_DIFF:0:524288}" | iconv -f UTF-8 -t UTF-8 -c)

          PROMPT="The task is created automatically by the CI/CD pipeline system. You are working in the ASLM project (Advanced System Language Models) — a Windows desktop application built with C# and .NET MAUI. The application is a launcher and manager for AI models and modules. The project contains documentation in the 'Docs/ASLM/' directory based on the Hugo Framework (Lotus Docs theme). This pipeline was launched after an automated documentation-update pipeline (Jules) that updated documentation based on user code changes. Your task is to create a Patch Note summarizing what changed: analyze the user's original commit '${BASE_COMMIT_MESSAGE}' and the documentation pipeline commit '${JULES_DOCS_COMMIT_MESSAGE}'. Carefully study the existing patch notes in 'Docs/ASLM/content/docs/PatchNotes/' to understand the style and format. Create a new .md file in 'Docs/ASLM/content/docs/PatchNotes/', naming it 'YYYYMMDDHHmm-Short-Name.md' where YYYYMMDDHHmm is your current UTC time and Short-Name is a concise title for the changes (example: '202606010930-Module-Runner-Refactor.md'). The file must include Hugo front matter with fields: title, date (RFC3339 format), draft: false, description. Include the following sections: '## New Features', '## Bug Fixes', '## API Changes', '## Known Issues'. Write clear, user-facing descriptions of each change. Do not change any files outside 'Docs/ASLM/content/docs/PatchNotes/'. Name the output branch 'jules-patchnotes-dev-BRANCH_NAME' where BRANCH_NAME is a short descriptive name, always preserving the 'jules-patchnotes-dev-' prefix (example: 'jules-patchnotes-dev-module-runner-refactor'). If there were no meaningful changes, name the branch 'jules-patchnotes-dev-YYYYMMDDHHmm'. Keep in mind that this task was created automatically and may have errors, but follow the instructions as closely as possible. User commit modified files: '${BASE_CHANGED_FILES}'. User commit diff: '${BASE_COMMIT_DIFF}'. Documentation pipeline modified files: '${JULES_DOCS_CHANGED_FILES}'. Documentation pipeline diff: '${JULES_DOCS_COMMIT_DIFF}'."

          PROMPT_FILE="${RUNNER_TEMP}/jules_prompt.txt"
          printf '%s' "$PROMPT" > "$PROMPT_FILE"
          echo "prompt_file=$PROMPT_FILE" >> "$GITHUB_OUTPUT"

      - name: Jules - Create Session
        id: create-session
        env:
          PROMPT_FILE: ${{ steps.generate-prompt.outputs.prompt_file }}
        run: |
          JSON_PAYLOAD=$(jq -n \
            --rawfile prompt "$PROMPT_FILE" \
            --arg source_repo "sources/github/${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg title "CI/CD: Update Patch Notes for ${{ github.ref_name }}" \
            '{
              prompt: $prompt,
              sourceContext: {
                source: $source_repo,
                githubRepoContext: { startingBranch: $branch }
              },
              title: $title,
              automationMode: "AUTO_CREATE_PR"
            }')

          RESPONSE_JSON=$(curl -s -X POST \
            'https://jules.googleapis.com/v1alpha/sessions' \
            -H "Content-Type: application/json" \
            -H 'X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}' \
            -d "$JSON_PAYLOAD")

          SESSION_NAME=$(echo "$RESPONSE_JSON" | jq -r '.name')
          echo "Jules session started: $SESSION_NAME"
          echo "session_name=$SESSION_NAME" >> $GITHUB_OUTPUT
          {
            echo 'api_response<<EOF'
            echo "$RESPONSE_JSON"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Jules - Report Result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SESSION_NAME: ${{ steps.create-session.outputs.session_name }}
          API_RESPONSE: ${{ steps.create-session.outputs.api_response }}
        run: |
          COMMIT_SHA="${{ github.event.after }}"

          if [[ -z "$SESSION_NAME" || "$SESSION_NAME" == "null" ]]; then
            ERROR=$(echo "$API_RESPONSE" | jq -r '.error.message // "Unknown error"')
            COMMENT_BODY="❌ Jules Patch Notes: failed to create session. Error: ${ERROR}"
            gh api --method POST -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/commits/$COMMIT_SHA/comments" \
              -f body="$COMMENT_BODY"
            exit 1
          fi

          SESSION_URL="https://jules.google.com/session/$(basename $SESSION_NAME)"
          COMMENT_BODY="🚀 Jules Patch Notes session started. Jules will create a patch note and open a PR into a \`jules-patchnotes-dev-*\` branch. Track progress: ${SESSION_URL}"
          echo "Posting comment: $COMMENT_BODY"
          gh api --method POST -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/commits/$COMMIT_SHA/comments" \
            -f body="$COMMENT_BODY"
